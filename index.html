<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz System</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .question { margin-bottom: 20px; }
    .option { display: block; margin: 5px 0; }
    button { margin-top: 20px; padding: 10px; }
    .result { font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Web Thi Online (MVP)</h2>

<div id="quiz"></div>

<button onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

<script>
const questions = [/* paste data ở trên vào đây */];

// render quiz
const quizDiv = document.getElementById("quiz");

questions.forEach((q, index) => {
  const div = document.createElement("div");
  div.className = "question";

  let html = `<h4>${index + 1}. ${q.question}</h4>`;

  for (let key in q.options) {
    html += `
      <label class="option">
        <input type="radio" name="q${index}" value="${key}">
        ${key}. ${q.options[key]}
      </label>
    `;
  }

  div.innerHTML = html;
  quizDiv.appendChild(div);
});

// submit
function submitQuiz() {
  let score = 0;

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && selected.value === q.answer) {
      score++;
    }
  });

  document.getElementById("result").innerHTML =
    `Bạn đúng: ${score} / ${questions.length}`;
}
</script>

</body>
</html>
